name: da-cli-0-6-0-construct
# Regenerates the da-cli-0-6-0 dogfood site from checked-in sources under
# dogfood/fixtures/. Each artifact is built by da (content put) and activated
# (preview page), so the site is reproducible and provable rather than authored
# by hand (ADR 0003, strong form).
#
# Validate:  da --org somarc --repo da-cli-0-6-0 pipeline run dogfood/construct.yaml --dry-run --format json
# Regenerate: da --org somarc --repo da-cli-0-6-0 --commit pipeline run dogfood/construct.yaml
#
# Root --commit is the single approval boundary; never bury --commit in a step.
steps:
  - id: put-index
    command: content put /index.html dogfood/fixtures/index.html --format json
  - id: preview-index
    command: preview page /index --format json
    depends_on: [put-index]
  - id: put-nav
    command: content put /nav.html dogfood/fixtures/nav.html --format json
    depends_on: [preview-index]
  - id: preview-nav
    command: preview page /nav --format json
    depends_on: [put-nav]
  - id: put-footer
    command: content put /footer.html dogfood/fixtures/footer.html --format json
    depends_on: [preview-nav]
  - id: preview-footer
    command: preview page /footer --format json
    depends_on: [put-footer]
  - id: put-why
    command: content put /why.html dogfood/fixtures/why.html --format json
    depends_on: [preview-footer]
  - id: preview-why
    command: preview page /why --format json
    depends_on: [put-why]
  - id: put-test-plan
    command: content put /test-plan.html dogfood/fixtures/test-plan.html --format json
    depends_on: [preview-why]
  - id: preview-test-plan
    command: preview page /test-plan --format json
    depends_on: [put-test-plan]
  - id: put-blocks
    command: content put /blocks.html dogfood/fixtures/blocks.html --format json
    depends_on: [preview-test-plan]
  - id: preview-blocks
    command: preview page /blocks --format json
    depends_on: [put-blocks]
  - id: put-coverage
    command: content put /coverage.html dogfood/fixtures/coverage.html --format json
    depends_on: [preview-blocks]
  - id: preview-coverage
    command: preview page /coverage --format json
    depends_on: [put-coverage]
  - id: put-learnings
    command: content put /learnings.html dogfood/fixtures/learnings.html --format json
    depends_on: [preview-coverage]
  - id: preview-learnings
    command: preview page /learnings --format json
    depends_on: [put-learnings]
  - id: put-f001
    command: content put /learnings/f001-site-info-target.html dogfood/fixtures/learnings/f001-site-info-target.html --format json
    depends_on: [preview-learnings]
  - id: preview-f001
    command: preview page /learnings/f001-site-info-target --format json
    depends_on: [put-f001]
  - id: put-f002
    command: content put /learnings/f002-design-detect-envelope.html dogfood/fixtures/learnings/f002-design-detect-envelope.html --format json
    depends_on: [preview-f001]
  - id: preview-f002
    command: preview page /learnings/f002-design-detect-envelope --format json
    depends_on: [put-f002]
  - id: put-f003
    command: content put /learnings/f003-index-build.html dogfood/fixtures/learnings/f003-index-build.html --format json
    depends_on: [preview-f002]
  - id: preview-f003
    command: preview page /learnings/f003-index-build --format json
    depends_on: [put-f003]
  - id: put-f004
    command: content put /learnings/f004-index-env-preview.html dogfood/fixtures/learnings/f004-index-env-preview.html --format json
    depends_on: [preview-f003]
  - id: preview-f004
    command: preview page /learnings/f004-index-env-preview --format json
    depends_on: [put-f004]
  - id: put-f005
    command: content put /learnings/f005-route-codebus.html dogfood/fixtures/learnings/f005-route-codebus.html --format json
    depends_on: [preview-f004]
  - id: preview-f005
    command: preview page /learnings/f005-route-codebus --format json
    depends_on: [put-f005]
  - id: put-f006
    command: content put /learnings/f006-stale-contentbus.html dogfood/fixtures/learnings/f006-stale-contentbus.html --format json
    depends_on: [preview-f005]
  - id: preview-f006
    command: preview page /learnings/f006-stale-contentbus --format json
    depends_on: [put-f006]
  - id: put-f007
    command: content put /learnings/f007-route-clean-orphan.html dogfood/fixtures/learnings/f007-route-clean-orphan.html --format json
    depends_on: [preview-f006]
  - id: preview-f007
    command: preview page /learnings/f007-route-clean-orphan --format json
    depends_on: [put-f007]
  - id: put-f008
    command: content put /learnings/f008-content-merge-path.html dogfood/fixtures/learnings/f008-content-merge-path.html --format json
    depends_on: [preview-f007]
  - id: preview-f008
    command: preview page /learnings/f008-content-merge-path --format json
    depends_on: [put-f008]
  - id: put-f009
    command: content put /learnings/f009-content-put-outside-worktree.html dogfood/fixtures/learnings/f009-content-put-outside-worktree.html --format json
    depends_on: [preview-f008]
  - id: preview-f009
    command: preview page /learnings/f009-content-put-outside-worktree --format json
    depends_on: [put-f009]
  - id: put-f010
    command: content put /learnings/f010-media-absolute-url-rewrite.html dogfood/fixtures/learnings/f010-media-absolute-url-rewrite.html --format json
    depends_on: [preview-f009]
  - id: preview-f010
    command: preview page /learnings/f010-media-absolute-url-rewrite --format json
    depends_on: [put-f010]
  - id: put-f011
    command: content put /learnings/f011-audit-contracts-autoblock.html dogfood/fixtures/learnings/f011-audit-contracts-autoblock.html --format json
    depends_on: [preview-f010]
  - id: preview-f011
    command: preview page /learnings/f011-audit-contracts-autoblock --format json
    depends_on: [put-f011]
  - id: put-dualform
    command: content put /dualform.html dogfood/fixtures/dualform.html --format json
    depends_on: [preview-f011]
  - id: preview-dualform
    command: preview page /dualform --format json
    depends_on: [put-dualform]
  # Wave 2 — form sheet + modal fragment for kitchen-sink spectrum
  - id: put-contact-form
    command: content put /data/contact-form.json dogfood/fixtures/data/contact-form.json --format json
    depends_on: [preview-dualform]
  - id: preview-contact-form
    command: preview page /data/contact-form.json --format json
    depends_on: [put-contact-form]
  - id: put-modal-sample
    command: content put /modals/sample.html dogfood/fixtures/modals/sample.html --format json
    depends_on: [preview-contact-form]
  - id: preview-modal-sample
    command: preview page /modals/sample --format json
    depends_on: [put-modal-sample]
  # Wave 2 — kitchen-sink module spectrum (block/audit/design proof surface)
  - id: put-kitchen-sink
    command: content put /kitchen-sink.html dogfood/fixtures/kitchen-sink.html --format json
    depends_on: [preview-modal-sample]
  - id: preview-kitchen-sink
    command: preview page /kitchen-sink --format json
    depends_on: [put-kitchen-sink]
  # Wave 2 — CLI surface ledger (command addendum for formal cut)
  - id: put-cli-surface
    command: content put /cli-surface.html dogfood/fixtures/cli-surface.html --format json
    depends_on: [preview-kitchen-sink]
  - id: preview-cli-surface
    command: preview page /cli-surface --format json
    depends_on: [put-cli-surface]
  - id: put-wave-2-cli-surface-data
    command: content put /data/wave-2-cli-surface.json dogfood/fixtures/data/wave-2-cli-surface.json --format json
    depends_on: [preview-cli-surface]
  - id: preview-wave-2-cli-surface-data
    command: preview page /data/wave-2-cli-surface.json --format json
    depends_on: [put-wave-2-cli-surface-data]
  # Wave 3 — authored structured-data sheet (contentbus), discovered by `da content sheets`.
  - id: put-coverage-data
    command: content put /data/coverage.json dogfood/fixtures/coverage-data.json --format json
    depends_on: [preview-wave-2-cli-surface-data]
  - id: preview-coverage-data
    command: preview page /data/coverage.json --format json
    depends_on: [put-coverage-data]
  # Wave 3 — public ownership matrix proof page
  - id: put-route-matrix
    command: content put /route-matrix.html dogfood/fixtures/route-matrix.html --format json
    depends_on: [preview-coverage-data]
  - id: preview-route-matrix
    command: preview page /route-matrix --format json
    depends_on: [put-route-matrix]
  # Wave 3 — query index: after publish, run `da --commit index build --yes` (or
  # Configuration Service reindex). Evidence under dogfood/evidence/wave-3/.
  # Flywheel — learnings published after the Wave 3 cut (f012 fixed, f013 open)
  - id: put-f012
    command: content put /learnings/f012-da-permission-headers.html dogfood/fixtures/learnings/f012-da-permission-headers.html --format json
    depends_on: [preview-route-matrix]
  - id: preview-f012
    command: preview page /learnings/f012-da-permission-headers --format json
    depends_on: [put-f012]
  - id: put-f013
    command: content put /learnings/f013-tools-classify-probe-gap.html dogfood/fixtures/learnings/f013-tools-classify-probe-gap.html --format json
    depends_on: [preview-f012]
  - id: preview-f013
    command: preview page /learnings/f013-tools-classify-probe-gap --format json
    depends_on: [put-f013]
  - id: put-f014
    command: content put /learnings/f014-pipeline-json-stdout.html dogfood/fixtures/learnings/f014-pipeline-json-stdout.html --format json
    depends_on: [preview-f013]
  - id: preview-f014
    command: preview page /learnings/f014-pipeline-json-stdout --format json
    depends_on: [put-f014]
