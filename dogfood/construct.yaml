name: da-cli-0-6-0-construct
# Regenerates the da-cli-0-6-0 dogfood site from checked-in sources under
# dogfood/fixtures/. Each artifact is built by da (content put) and activated
# (preview page), so the site is reproducible and provable rather than authored
# by hand (ADR 0003, strong form).
#
# Validate:  da --org somarc --repo da-cli-0-6-0 pipeline run dogfood/construct.yaml --dry-run --format json
# Regenerate: da --org somarc --repo da-cli-0-6-0 --commit pipeline run dogfood/construct.yaml
#
# Root --commit is the single approval boundary; never bury --commit in a step.
#
# STATED BOUNDARY: this pipeline intentionally stops at PREVIEW. Publishing to
# live is a separate promotion decision, taken explicitly after the previewed
# site is verified:
#   da --org somarc --repo da-cli-0-6-0 --commit publish pages / --bulk --yes
#   da --org somarc --repo da-cli-0-6-0 --commit index build --wait --yes
# (See da-cli docs/BOUNDARIES.md "Pipelines Stop At Preview By Design".)
steps:
  - id: put-index
    command: content put /index.html dogfood/fixtures/index.html --format json
  - id: preview-index
    command: preview page /index --format json
    depends_on: [put-index]
  - id: put-nav
    command: content put /nav.html dogfood/fixtures/nav.html --format json
    depends_on: [preview-index]
  - id: preview-nav
    command: preview page /nav --format json
    depends_on: [put-nav]
  - id: put-footer
    command: content put /footer.html dogfood/fixtures/footer.html --format json
    depends_on: [preview-nav]
  - id: preview-footer
    command: preview page /footer --format json
    depends_on: [put-footer]
  - id: put-why
    command: content put /why.html dogfood/fixtures/why.html --format json
    depends_on: [preview-footer]
  - id: preview-why
    command: preview page /why --format json
    depends_on: [put-why]
  - id: put-test-plan
    command: content put /test-plan.html dogfood/fixtures/test-plan.html --format json
    depends_on: [preview-why]
  - id: preview-test-plan
    command: preview page /test-plan --format json
    depends_on: [put-test-plan]
  - id: put-blocks
