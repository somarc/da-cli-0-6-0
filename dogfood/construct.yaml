  - id: preview-blocks
    command: preview page /blocks --format json
    depends_on: [put-blocks]
  - id: put-coverage
    command: content put /coverage.html dogfood/fixtures/coverage.html --format json
    depends_on: [preview-blocks]
  - id: preview-coverage
    command: preview page /coverage --format json
    depends_on: [put-coverage]
  - id: put-learnings
